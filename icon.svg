<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="84" fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.5"/>
  <text x="256" y="330" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="280" fill="url(#txt)" text-anchor="middle" filter="url(#glow)" letter-spacing="-8">JD</text>
  <line x1="80" y1="390" x2="432" y2="390" stroke="#3b82f6" stroke-width="4" opacity="0.6"/>
  <text x="256" y="430" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#60a5fa" text-anchor="middle" letter-spacing="12">FINANCIERA</text>
</svg>
